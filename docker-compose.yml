version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: python -m src.backend.main
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - BACKEND_API_HOST=0.0.0.0
      - BACKEND_API_PORT=8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  worker:
    build: .
    command: celery -A src.backend.celery_app.celery_app worker -l info --concurrency=2
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - .env
    volumes:
      - ./:/app
